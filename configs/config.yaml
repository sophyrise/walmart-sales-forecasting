project_name: walmart-sales-forecasting
data_path: ./data
models_path: ./models

mlflow:
  tracking_uri: dagshub
  experiment_tracking: true

data:
  random_seed: 42
  train_test_split: 0.8
  validation_split: 0.2

experiments:
  - TFT_Training
  - NBEATS_Training
  - ARIMA_Training
  - SARIMA_Training
  - XGBoost_Training
  - LightGBM_Training
  - DLinear_Training
  - Prophet_Training
  - TimesFM_Training

registered_model_name: walmart_best_model
