# Project configuration
project_name: walmart-sales-forecasting
data_path: ./data
models_path: ./models

# MLflow settings
mlflow:
  tracking_uri: dagshub
  experiment_tracking: true

# Data settings
data:
  random_seed: 42
  train_test_split: 0.8
  validation_split: 0.2

# Model experiments (one MLflow experiment per architecture, 4+4 split)
experiments:
  - TFT_Training          # Sopho
  - NBEATS_Training       # Sopho
  - ARIMA_Training        # Sopho
  - SARIMA_Training       # Sopho
  - XGBoost_Training      # Teammate
  - LightGBM_Training     # Teammate
  - DLinear_Training      # Teammate
  - Prophet_Training      # Teammate
  - TimesFM_Training      # bonus (foundation model)

registered_model_name: walmart_best_model
